<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — AgriSmart Hub</title>
 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>


  <nav class="navbar navbar-expand-lg navbar-dark sticky-top main-navbar">
    <div class="container">
      <a class="navbar-brand site-logo" href="index.html">AgriSmart Hub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="innovations.html">Innovations</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="section py-5 bg-white">
    <div class="container">
      <h2 class="section-title text-center mb-5">Get in Touch</h2>
      <div class="row g-4">
      
        <div class="col-lg-7">
          <form class="contact-form p-4 rounded shadow-sm bg-light">
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" placeholder="Your Name">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="Your Email">
            </div>
            <div class="mb-3">
              <label for="subject" class="form-label">Subject</label>
              <input type="text" class="form-control" id="subject" placeholder="Subject">
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Message</label>
              <textarea class="form-control" id="message" rows="5" placeholder="Write your message here..."></textarea>
            </div>
            <button type="submit" class="btn btn-submit">Send Message</button>
          </form>
        </div>

        
        <div class="col-lg-5">
          <div class="card p-4 shadow-sm contact-sidebar">
            <h5>Contact Details</h5>
            <p><strong>Phone:</strong> +251 912 345 678</p>
            <p><strong>Email:</strong> info@agrismarthub.com</p>
            <p><strong>Address:</strong> 4 Kilo, Addis Ababa, Ethiopia</p>
            <h6 class="mt-4">Our Location</h6>
            <div class="ratio ratio-16x9 mt-2">
               <iframe 
                   src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3980.5!2d38.7605!3d9.0344!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x164b8a1a1234567%3A0xabcdef1234567890!2sAddis%20Ababa%20University%204%20Kilo%20Campus!5e0!3m2!1sen!2set!4v1700000000000" 
                    width="100%" 
                    height="100%" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>


  <footer class="footer py-3">
    <div class="container text-center">
      <div class="py-2">
        <small>© <span class="year"></span> AgriSmart Hub. All Rights Reserved.</small>
      </div>
      
      <div class="py-2 social-icons">
        <a href="https://telegram.org/" target="_blank"><i class="fab fa-telegram"></i></a>
        <a href="https://linkedin.com/" target="_blank"><i class="fab fa-linkedin"></i></a>
        <a href="https://instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://facebook.com/" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://twitter.com/" target="_blank"><i class="fab fa-twitter"></i></a>
      </div>
    </div>
  </footer>

 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll(".year").forEach(y => {
      y.textContent = new Date().getFullYear();
    });
  </script>

</body>
</html>
